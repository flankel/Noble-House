<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>都心の隠れ家 | Noble House</title>

<link rel="stylesheet" href="css/hideaway.css">

<!-- 360ビュー用 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css"/>
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

</head>

<body>

<!-- HERO -->
<section class="hero">
  <img id="hero-img" alt="">
  <div class="hero-text">
    <h1 id="title"></h1>
    <p id="subtitle"></p>
  </div>
</section>

<!-- CONCEPT -->
<section class="concept fade">
  <h2 id="concept-title"></h2>
  <p id="concept-text"></p>
</section>

<!-- 360 VIEW -->
<section class="viewer360 fade">
  <h2>360° VIEW</h2>
  <div id="panorama"></div>
</section>

<!-- CATEGORY -->
<section class="category">
  <button onclick="filterGallery(event,'all')" class="active">ALL</button>
  <button onclick="filterGallery(event,'interior')">内装</button>
  <button onclick="filterGallery(event,'exterior')">外観</button>
  <!-- <button onclick="filterGallery(event,'night')">夜景</button> -->
</section>

<!-- GALLERY -->
<section class="gallery">
  <div id="grid"></div>
</section>

<!-- MODAL -->
<div id="modal" onclick="closeModal()">
  <img id="modal-img">
</div>

<script src="js/hideaway.js"></script>
</body>
</html>
