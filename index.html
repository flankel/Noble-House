<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title"></title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-white">

<header class="w-full bg-white py-6 border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-4">

        <div class="text-center md:text-left">
            <h1 id="brand" class="text-3xl font-eng font-bold tracking-widest text-black"></h1>
            <p id="tagline" class="text-[10px] tracking-[0.4em] uppercase text-gray-500 mt-1"></p>
        </div>

        <nav class="flex space-x-8 text-sm tracking-widest text-gray-600">
            <a href="#concept" id="nav-concept" class="hover:text-black hover:underline underline-offset-4 transition"></a>
            <a href="#works" id="nav-works" class="hover:text-black hover:underline underline-offset-4 transition"></a>
            <a href="#contact" id="nav-contact" class="hover:text-black hover:underline underline-offset-4 transition"></a>
        </nav>
    </div>
</header>

<section class="relative h-[80vh] w-full bg-gray-900 overflow-hidden">
    <img id="hero-img" class="w-full h-full object-cover brightness-50">

    <div class="absolute inset-0 flex flex-col justify-center items-center text-center text-white px-4">
        <p id="hero-sub" class="font-eng text-lg md:text-xl tracking-[0.2em] mb-4"></p>
        <h2 id="hero-title" class="text-4xl md:text-7xl font-light leading-tight mb-8"></h2>
        <div class="h-[1px] w-20 bg-white/50"></div>
    </div>
</section>

<section id="concept" class="py-24 px-6 max-w-5xl mx-auto">
    <div class="text-center mb-16">
        <span id="concept-label" class="font-eng text-sm tracking-[0.3em] text-gray-500 block mb-4"></span>
        <h3 id="concept-title" class="text-3xl md:text-4xl leading-relaxed"></h3>
    </div>

    <div class="grid md:grid-cols-2 gap-12 items-center">
        <div class="bg-gray-100">
            <img id="concept-img" class="w-full h-auto object-cover grayscale hover:grayscale-0 transition duration-700">
        </div>

        <div class="text-gray-700 leading-loose space-y-6">
            <p id="concept-text1"></p>
            <p id="concept-text2"></p>
            <div class="pt-4">
                <p id="concept-sign" class="font-eng text-2xl text-gray-400"></p>
            </div>
        </div>
    </div>
</section>

<section id="works" class="py-24 bg-gray-50">
    <div class="max-w-7xl mx-auto px-6">
        <div class="flex justify-between items-end mb-12">
            <div>
                <span id="works-label" class="font-eng text-sm tracking-[0.3em] text-gray-500 block mb-2"></span>
                <h3 id="works-title" class="text-3xl font-light"></h3>
            </div>
            <a href="#" id="works-link" class="hidden md:block text-sm border-b border-gray-400 pb-1 hover:border-black transition"></a>
        </div>

        <div id="works-container" class="grid md:grid-cols-3 gap-8"></div>
    </div>
</section>

<section id="contact" class="py-24 px-6 bg-gray-900 text-white text-center">
    <h3 id="contact-title" class="font-eng text-4xl mb-6"></h3>
    <p id="contact-text" class="text-gray-300 mb-10"></p>

    <div class="flex flex-col md:flex-row justify-center gap-6">
        <a href="#" id="btn-contact" class="bg-white text-black px-10 py-4 font-bold tracking-widest text-sm hover:bg-gray-200 transition"></a>
        <a href="#" id="btn-doc" class="border border-white text-white px-10 py-4 font-bold tracking-widest text-sm hover:bg-white hover:text-black transition"></a>
    </div>
</section>

<footer class="bg-white py-12 border-t border-gray-100 text-center">
    <h4 id="footer-brand" class="font-eng font-bold text-xl mb-2"></h4>
    <p id="footer-address" class="text-xs text-gray-500"></p>
</footer>

<script src="script.js"></script>
</body>
</html>
