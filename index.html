<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noble House | 邸宅という名のアート</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://images.unsplash.com">

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>

<body class="bg-white">

  <!-- HEADER -->
  <header class="header">
    <div class="container flex justify-between items-center">
      <div>
        <h1 class="logo">NOBLE HOUSE</h1>
        <p class="logo-sub">Architects</p>
      </div>

      <nav class="nav hidden md:flex">
        <a href="#concept">CONCEPT</a>
        <a href="#works">WORKS</a>
        <a href="#contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <img id="hero-img" class="hero-img" loading="lazy">

    <div class="hero-content">
      <p id="hero-sub" class="hero-sub fade-up"></p>

      <h2 id="hero-title" class="hero-title fade-up"></h2>

      <div class="hero-line fade-up"></div>
    </div>
  </section>

  <!-- CONCEPT (REAL DESIGN FIX) -->
  <section id="concept" class="concept-wrap">

    <div class="container grid md:grid-cols-12 gap-10 items-center">

      <!-- IMAGE -->
      <div class="col-span-12 md:col-span-7 fade-up">
        <img id="concept-img" class="concept-img" loading="lazy">
      </div>

      <!-- TEXT -->
      <div class="col-span-12 md:col-span-5 md:-ml-16 fade-up">

        <div class="concept-card">

          <span class="concept-label">PHILOSOPHY</span>

          <h3 id="concept-title" class="concept-title"></h3>

          <div id="concept-text" class="concept-body"></div>

        </div>

      </div>

    </div>
  </section>

  <!-- WORKS -->
  <section id="works" class="works">

    <div class="container">

      <div class="works-header fade-up">
        <span class="section-label">WORKS</span>
        <h3>建築実例</h3>
      </div>

      <div id="works-grid" class="grid md:grid-cols-3 gap-10"></div>

    </div>

  </section>

  <!-- CONTACT (MINIMAL LUXURY) -->
  <section id="contact" class="contact-wrap">

    <div class="container fade-up text-center">

      <span class="contact-label">CONTACT</span>

      <h3 id="contact-title" class="contact-title"></h3>

      <p id="contact-text" class="contact-desc"></p>

      <a href="#" class="contact-link">
        Contact Us
        <span class="arrow">→</span>
      </a>

    </div>

  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container text-center">
      <p class="footer-text">© Noble House Architects</p>
    </div>
  </footer>

  <!-- JS -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
