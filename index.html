<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noble House | 邸宅という名のアート</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Shippori+Mincho:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- External CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-white">

  <!-- HEADER -->
  <header class="header">
    <div class="container flex flex-col md:flex-row justify-between items-center gap-4">
      <div class="text-center md:text-left">
        <h1 class="logo">NOBLE HOUSE</h1>
        <p class="logo-sub">Architects</p>
      </div>

      <nav class="nav">
        <a href="#concept">CONCEPT</a>
        <a href="#works">WORKS</a>
        <a href="#contact">CONTACT</a>
      </nav>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <img id="hero-img" class="hero-img">

    <div class="hero-content fade-up">
      <p id="hero-sub" class="hero-sub"></p>
      <h2 id="hero-title" class="hero-title"></h2>
      <div class="divider"></div>
    </div>
  </section>

  <!-- CONCEPT -->
  <section id="concept" class="section fade-up">
    <div class="container text-center mb-16">
      <span class="section-label">PHILOSOPHY</span>
      <h3 id="concept-title"></h3>
    </div>

    <div class="container grid md:grid-cols-2 gap-12 items-center">
      <img id="concept-img" class="concept-img">
      <div id="concept-text" class="concept-text"></div>
    </div>
  </section>

  <!-- WORKS -->
  <section id="works" class="works fade-up">
    <div class="container">
      <div class="flex justify-between items-end mb-12">
        <div>
          <span class="section-label">WORKS</span>
          <h3>建築実例</h3>
        </div>
      </div>

      <div id="works-grid" class="grid md:grid-cols-3 gap-8"></div>
    </div>
  </section>

  <!-- CONTACT -->
  <section id="contact" class="contact fade-up">
    <div class="container text-center">
      <h3 id="contact-title"></h3>
      <p id="contact-text"></p>
    </div>
  </section>

  <!-- JS -->
  <script src="js/main.js"></script>

</body>
</html>
